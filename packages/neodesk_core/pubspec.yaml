name: neodesk_core
description: >-
  Redesigned RustDesk mobile UI + clean port/interface layer. This is the UI
  package (with a standalone FakeCore demo); the real engine app is in ./app.
  See README.md.
publish_to: "none"
version: 0.0.1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  # The core layer + UI import only flutter and their own files; the engine
  # adapter (with ffi / flutter_rust_bridge / get) lives in the app, not here.

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
